<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>修理品受渡管理</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --surface-0:#f5f5f3;--surface-1:#efefed;--surface-2:#ffffff;
  --text-primary:#1a1a18;--text-secondary:#5f5e5a;--text-muted:#888780;
  --border:#e0dfd8;--border-strong:#c8c7c0;
  --fill-accent:#2563eb;--bg-accent:#eff6ff;--text-accent:#1d4ed8;--border-accent:#bfdbfe;
  --bg-success:#f0fdf4;--text-success:#166534;--border-success:#bbf7d0;
  --bg-warning:#fffbeb;--text-warning:#92400e;
  --bg-danger:#fef2f2;--text-danger:#991b1b;--border-danger:#fecaca;
  --radius:8px;
}
@media(prefers-color-scheme:dark){
  :root{
    --surface-0:#1c1c1a;--surface-1:#242422;--surface-2:#2e2e2c;
    --text-primary:#f0efe8;--text-secondary:#a8a79f;--text-muted:#666560;
    --border:#3a3a38;--border-strong:#4a4a48;
    --fill-accent:#3b82f6;--bg-accent:#1e3a5f;--text-accent:#93c5fd;--border-accent:#1e40af;
    --bg-success:#052e16;--text-success:#86efac;
    --bg-warning:#1c1200;--text-warning:#fde68a;
    --bg-danger:#1f0a0a;--text-danger:#fca5a5;
  }
}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;background:var(--surface-0);color:var(--text-primary);min-height:100vh;padding:1rem}
.app{max-width:700px;margin:0 auto;padding-bottom:3rem}
.step-bar{display:flex;margin-bottom:1.5rem;border-radius:var(--radius);overflow:hidden;border:0.5px solid var(--border)}
.step-btn{flex:1;padding:10px 4px;font-size:12px;font-weight:500;border:none;background:var(--surface-1);color:var(--text-muted);cursor:pointer;transition:all .15s;border-right:0.5px solid var(--border);line-height:1.6}
.step-btn:last-child{border-right:none}
.step-btn.active{background:var(--fill-accent);color:#fff}
.step-btn.done{background:var(--bg-success);color:var(--text-success)}
.card{background:var(--surface-2);border:0.5px solid var(--border);border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.card-title{font-size:14px;font-weight:500;color:var(--text-secondary);margin-bottom:1rem;display:flex;align-items:center;gap:6px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:10px}
.field-row.full{grid-template-columns:1fr}
.field label{font-size:12px;color:var(--text-secondary);display:block;margin-bottom:4px}
.field input,.field textarea{width:100%;padding:8px 10px;font-size:13px;border:0.5px solid var(--border-strong);border-radius:var(--radius);background:var(--surface-2);color:var(--text-primary);font-family:inherit;outline:none;transition:.15s}
.field input:focus,.field textarea:focus{border-color:var(--fill-accent);box-shadow:0 0 0 3px var(--bg-accent)}
.field textarea{resize:vertical;min-height:72px}
.sign-wrap{border:0.5px solid var(--border-strong);border-radius:var(--radius);overflow:hidden;background:#fff}
.sign-wrap canvas{display:block;width:100%;height:130px;cursor:crosshair;touch-action:none}
.sign-toolbar{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:var(--surface-1);border-top:0.5px solid var(--border)}
.sign-label{font-size:11px;color:var(--text-muted)}
.sign-clear{font-size:11px;padding:3px 8px;border:0.5px solid var(--border-strong);border-radius:var(--radius);background:transparent;color:var(--text-secondary);cursor:pointer}
.sign-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.signer-name{font-size:12px;font-weight:500;color:var(--text-secondary);margin-bottom:6px}
.photo-area{border:1.5px dashed var(--border-strong);border-radius:var(--radius);padding:1.5rem;text-align:center;cursor:pointer;transition:.15s;background:var(--surface-1)}
.photo-area:hover{border-color:var(--fill-accent);background:var(--bg-accent)}
.photo-area i{font-size:28px;color:var(--text-muted);display:block;margin-bottom:6px}
.photo-area p{font-size:12px;color:var(--text-muted)}
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;margin-top:10px}
.photo-thumb{position:relative;border-radius:var(--radius);overflow:hidden;aspect-ratio:1;background:var(--surface-1)}
.photo-thumb img{width:100%;height:100%;object-fit:cover}
.photo-del{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.65);color:#fff;border:none;border-radius:50%;width:22px;height:22px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.btn-row{display:flex;gap:10px;margin-top:1.5rem}
.btn{padding:10px 20px;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;border:0.5px solid var(--border-strong);background:transparent;color:var(--text-primary);flex:1;transition:.15s}
.btn:hover{background:var(--surface-1)}
.btn.primary{background:var(--fill-accent);color:#fff;border-color:transparent}
.btn.primary:hover{opacity:.88}
.status-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:3px 10px;border-radius:20px}
.badge-recv{background:var(--bg-warning);color:var(--text-warning)}
.badge-done{background:var(--bg-success);color:var(--text-success)}
.info-row{display:flex;justify-content:space-between;font-size:12px;padding:5px 0;border-bottom:0.5px solid var(--border)}
.info-row:last-child{border-bottom:none}
.info-key{color:var(--text-muted);flex-shrink:0;margin-right:12px}
.info-val{color:var(--text-primary);font-weight:500;text-align:right;word-break:break-all}
.section-heading{font-size:13px;font-weight:500;color:var(--text-secondary);margin:1rem 0 .5rem;display:flex;align-items:center;gap:6px}
.preview-sign{max-width:100%;border:0.5px solid var(--border);border-radius:var(--radius);background:#fff;display:block;min-height:40px}
.notice{font-size:12px;color:var(--text-muted);text-align:center;margin-top:.5rem}
#step-view>div{display:none}
#step-view>div.active{display:block}

@media(max-width:520px){
  .field-row{grid-template-columns:1fr}
  .sign-grid{grid-template-columns:1fr}
}

@media print{
  body{background:#fff;padding:0}
  .step-bar,.btn-row,.notice,.photo-area,input[type=file],.photo-del,.sign-clear,.sign-toolbar{display:none!important}
  .card{border:1px solid #ccc;break-inside:avoid;margin-bottom:.5rem}
  .app{max-width:100%;padding:0}
}
</style>
</head>
<body>
<div class="app">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem">
    <div>
      <div style="font-size:20px;font-weight:500">修理品受渡管理</div>
      <div style="font-size:12px;color:var(--text-muted)" id="doc-id">新規票</div>
    </div>
    <span class="status-badge badge-recv" id="status-badge"><i class="ti ti-clock" style="font-size:12px"></i> 未処理</span>
  </div>

  <div class="step-bar">
    <button class="step-btn active" onclick="goStep(0)"><i class="ti ti-clipboard-list"></i><br>製品情報</button>
    <button class="step-btn" onclick="goStep(1)"><i class="ti ti-arrow-down-circle"></i><br>受取</button>
    <button class="step-btn" onclick="goStep(2)"><i class="ti ti-arrow-up-circle"></i><br>返却</button>
    <button class="step-btn" onclick="goStep(3)"><i class="ti ti-file-check"></i><br>確認・PDF</button>
  </div>

  <div id="step-view">

    <!-- Step 0: 製品情報 -->
    <div class="active">
      <div class="card">
        <div class="card-title"><i class="ti ti-building-hospital"></i>施設情報</div>
        <div class="field-row">
          <div class="field"><label>病院名 / 施設名</label><input id="f-hospital" type="text" placeholder="例：〇〇医療センター"></div>
          <div class="field"><label>担当者名</label><input id="f-contact" type="text" placeholder="例：田中 花子"></div>
        </div>
        <div class="field-row">
          <div class="field"><label>部署名</label><input id="f-dept" type="text" placeholder="例：ME部"></div>
          <div class="field"><label>電話番号</label><input id="f-tel" type="tel" placeholder="例：03-0000-0000"></div>
        </div>
      </div>
      <div class="card">
        <div class="card-title"><i class="ti ti-device-medical"></i>製品情報</div>
        <div class="field-row">
          <div class="field"><label>製品名</label><input id="f-product" type="text" placeholder="例：人工呼吸器 XYZ-100"></div>
          <div class="field"><label>型番 / モデル</label><input id="f-model" type="text" placeholder="例：XYZ-100-A"></div>
        </div>
        <div class="field-row">
          <div class="field"><label>ロット番号</label><input id="f-lot" type="text" placeholder="例：LOT2024-001"></div>
          <div class="field"><label>シリアル番号</label><input id="f-serial" type="text" placeholder="例：SN-123456"></div>
        </div>
        <div class="field-row full">
          <div class="field"><label>数量</label><input id="f-qty" type="text" placeholder="例：1台"></div>
        </div>
        <div class="field-row full">
          <div class="field"><label>不具合・故障内容</label><textarea id="f-issue" placeholder="例：電源投入時に異常アラームが鳴る。画面左側に縦線が入る。"></textarea></div>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn primary" onclick="goStep(1)"><i class="ti ti-arrow-right"></i> 受取記録へ</button>
      </div>
    </div>

    <!-- Step 1: 受取 -->
    <div>
      <div class="card">
        <div class="card-title"><i class="ti ti-calendar"></i>受取情報</div>
        <div class="field-row">
          <div class="field"><label>受取日</label><input id="f-recv-date" type="date"></div>
          <div class="field"><label>自社担当者名</label><input id="f-recv-staff" type="text" placeholder="例：山田 太郎"></div>
        </div>
        <div class="field-row full">
          <div class="field"><label>受取時コメント</label><textarea id="f-recv-comment" placeholder="例：外装に擦り傷あり。付属品（ACアダプタ×1）も含む。"></textarea></div>
        </div>
      </div>
      <div class="card">
        <div class="card-title"><i class="ti ti-camera"></i>受取時の写真</div>
        <div class="photo-area" onclick="document.getElementById('photo-recv-input').click()">
          <i class="ti ti-camera-plus"></i>
          <p>タップして写真を追加（複数枚可）</p>
        </div>
        <input type="file" id="photo-recv-input" accept="image/*" multiple style="display:none" onchange="addPhotos('recv',this)">
        <div class="photo-grid" id="recv-photos"></div>
      </div>
      <div class="card">
        <div class="card-title"><i class="ti ti-pen"></i>受取時サイン</div>
        <div class="sign-grid">
          <div>
            <div class="signer-name"><i class="ti ti-building-hospital" style="font-size:13px"></i> 病院担当者</div>
            <div class="sign-wrap">
              <canvas id="sign-recv-hospital" width="320" height="130"></canvas>
              <div class="sign-toolbar">
                <span class="sign-label">指またはペンでサイン</span>
                <button class="sign-clear" onclick="clearSign('recv-hospital')">クリア</button>
              </div>
            </div>
          </div>
          <div>
            <div class="signer-name"><i class="ti ti-building" style="font-size:13px"></i> 自社担当者</div>
            <div class="sign-wrap">
              <canvas id="sign-recv-staff" width="320" height="130"></canvas>
              <div class="sign-toolbar">
                <span class="sign-label">指またはペンでサイン</span>
                <button class="sign-clear" onclick="clearSign('recv-staff')">クリア</button>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn" onclick="goStep(0)"><i class="ti ti-arrow-left"></i> 戻る</button>
        <button class="btn primary" onclick="goStep(2)">返却記録へ <i class="ti ti-arrow-right"></i></button>
      </div>
    </div>

    <!-- Step 2: 返却 -->
    <div>
      <div class="card">
        <div class="card-title"><i class="ti ti-calendar-check"></i>返却情報</div>
        <div class="field-row">
          <div class="field"><label>修理完了日</label><input id="f-repair-date" type="date"></div>
          <div class="field"><label>返却日</label><input id="f-return-date" type="date"></div>
        </div>
        <div class="field-row full">
          <div class="field"><label>自社担当者名</label><input id="f-return-staff" type="text" placeholder="例：山田 太郎"></div>
        </div>
        <div class="field-row full">
          <div class="field"><label>修理内容・結果</label><textarea id="f-repair-result" placeholder="例：電源基板を交換。動作確認済み。付属品もすべて返却。"></textarea></div>
        </div>
      </div>
      <div class="card">
        <div class="card-title"><i class="ti ti-camera"></i>返却時の写真</div>
        <div class="photo-area" onclick="document.getElementById('photo-return-input').click()">
          <i class="ti ti-camera-plus"></i>
          <p>タップして写真を追加（複数枚可）</p>
        </div>
        <input type="file" id="photo-return-input" accept="image/*" multiple style="display:none" onchange="addPhotos('return',this)">
        <div class="photo-grid" id="return-photos"></div>
      </div>
      <div class="card">
        <div class="card-title"><i class="ti ti-pen"></i>返却時サイン</div>
        <div class="sign-grid">
          <div>
            <div class="signer-name"><i class="ti ti-building-hospital" style="font-size:13px"></i> 病院担当者</div>
            <div class="sign-wrap">
              <canvas id="sign-return-hospital" width="320" height="130"></canvas>
              <div class="sign-toolbar">
                <span class="sign-label">指またはペンでサイン</span>
                <button class="sign-clear" onclick="clearSign('return-hospital')">クリア</button>
              </div>
            </div>
          </div>
          <div>
            <div class="signer-name"><i class="ti ti-building" style="font-size:13px"></i> 自社担当者</div>
            <div class="sign-wrap">
              <canvas id="sign-return-staff" width="320" height="130"></canvas>
              <div class="sign-toolbar">
                <span class="sign-label">指またはペンでサイン</span>
                <button class="sign-clear" onclick="clearSign('return-staff')">クリア</button>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn" onclick="goStep(1)"><i class="ti ti-arrow-left"></i> 戻る</button>
        <button class="btn primary" onclick="goStep(3)">確認・PDF出力 <i class="ti ti-arrow-right"></i></button>
      </div>
    </div>

    <!-- Step 3: 確認・PDF -->
    <div>
      <div class="card" id="preview-card">
        <div style="text-align:center;margin-bottom:1.25rem;padding-bottom:1rem;border-bottom:0.5px solid var(--border)">
          <div style="font-size:18px;font-weight:500;margin-bottom:4px">修理品受渡管理票</div>
          <div style="font-size:11px;color:var(--text-muted)" id="preview-docid"></div>
        </div>
        <div class="section-heading"><i class="ti ti-building-hospital"></i>施設・製品情報</div>
        <div id="preview-info"></div>
        <div class="section-heading" style="margin-top:1.25rem"><i class="ti ti-arrow-down-circle"></i>受取時</div>
        <div id="preview-recv-info"></div>
        <div style="margin-top:8px" id="preview-recv-photos"></div>
        <div class="section-heading" style="margin-top:8px"><i class="ti ti-pen"></i>受取サイン</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:4px">
          <div><div style="font-size:11px;color:var(--text-muted);margin-bottom:4px">病院担当者</div><img id="prev-sign-recv-hospital" class="preview-sign"></div>
          <div><div style="font-size:11px;color:var(--text-muted);margin-bottom:4px">自社担当者</div><img id="prev-sign-recv-staff" class="preview-sign"></div>
        </div>
        <div class="section-heading" style="margin-top:1.25rem"><i class="ti ti-arrow-up-circle"></i>返却時</div>
        <div id="preview-return-info"></div>
        <div style="margin-top:8px" id="preview-return-photos"></div>
        <div class="section-heading" style="margin-top:8px"><i class="ti ti-pen"></i>返却サイン</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div><div style="font-size:11px;color:var(--text-muted);margin-bottom:4px">病院担当者</div><img id="prev-sign-return-hospital" class="preview-sign"></div>
          <div><div style="font-size:11px;color:var(--text-muted);margin-bottom:4px">自社担当者</div><img id="prev-sign-return-staff" class="preview-sign"></div>
        </div>
        <div style="margin-top:1rem;padding-top:.75rem;border-top:0.5px solid var(--border);font-size:10px;color:var(--text-muted);text-align:center">
          ※ 本票は受渡の証明書となります。双方サイン後、各1部ずつ保管してください。
        </div>
      </div>
      <div class="btn-row">
        <button class="btn" onclick="goStep(2)"><i class="ti ti-arrow-left"></i> 戻る</button>
        <button class="btn primary" onclick="window.print()"><i class="ti ti-printer"></i> PDF印刷</button>
      </div>
      <p class="notice">印刷ダイアログで「PDFとして保存」を選択してください</p>
    </div>
  </div>
</div>

<script>
const photos={recv:[],return:[]};
const canvases={};
let drawing=false,lastX=0,lastY=0,currentCanvas=null;

function initCanvas(id){
  const canvas=document.getElementById('sign-'+id);
  if(!canvas||canvases[id])return;
  canvases[id]=canvas;
  const ctx=canvas.getContext('2d');
  ctx.strokeStyle='#111';ctx.lineWidth=2;ctx.lineCap='round';ctx.lineJoin='round';

  function pos(e){
    const r=canvas.getBoundingClientRect();
    const sx=canvas.width/r.width,sy=canvas.height/r.height;
    const src=e.touches?e.touches[0]:e;
    return[(src.clientX-r.left)*sx,(src.clientY-r.top)*sy];
  }
  function start(e){e.preventDefault();drawing=true;currentCanvas=canvas;const[x,y]=pos(e);lastX=x;lastY=y;ctx.beginPath();ctx.arc(x,y,1,0,Math.PI*2);ctx.fillStyle='#111';ctx.fill();}
  function move(e){e.preventDefault();if(!drawing||currentCanvas!==canvas)return;const[x,y]=pos(e);ctx.beginPath();ctx.moveTo(lastX,lastY);ctx.lineTo(x,y);ctx.stroke();lastX=x;lastY=y;}
  function end(){drawing=false;}
  canvas.addEventListener('mousedown',start);
  canvas.addEventListener('mousemove',move);
  canvas.addEventListener('mouseup',end);
  canvas.addEventListener('touchstart',start,{passive:false});
  canvas.addEventListener('touchmove',move,{passive:false});
  canvas.addEventListener('touchend',end);
}

function clearSign(id){
  const c=document.getElementById('sign-'+id);
  if(c)c.getContext('2d').clearRect(0,0,c.width,c.height);
}

function addPhotos(key,input){
  [...input.files].forEach(f=>{
    const url=URL.createObjectURL(f);
    photos[key].push(url);
  });
  renderPhotos(key);
  input.value='';
}

function renderPhotos(key){
  const g=document.getElementById(key+'-photos');
  g.innerHTML=photos[key].map((url,i)=>`
    <div class="photo-thumb">
      <img src="${url}" alt="写真${i+1}">
      <button class="photo-del" onclick="removePhoto('${key}',${i})">×</button>
    </div>`).join('');
}

function removePhoto(key,i){photos[key].splice(i,1);renderPhotos(key);}

const steps=document.querySelectorAll('#step-view>div');
const stepBtns=document.querySelectorAll('.step-btn');

function goStep(n){
  if(n===3)buildPreview();
  steps.forEach((s,i)=>s.classList.toggle('active',i===n));
  stepBtns.forEach((b,i)=>{
    b.classList.remove('active','done');
    if(i===n)b.classList.add('active');
    else if(i<n)b.classList.add('done');
  });
  ['recv-hospital','recv-staff','return-hospital','return-staff'].forEach(initCanvas);
  window.scrollTo({top:0,behavior:'smooth'});
}

function v(id){return(document.getElementById(id)||{}).value||'';}

function infoRow(k,val){
  if(!val)return'';
  return`<div class="info-row"><span class="info-key">${k}</span><span class="info-val">${val}</span></div>`;
}

function buildPreview(){
  const id='NO-'+Date.now().toString(36).toUpperCase();
  document.getElementById('preview-docid').textContent='管理番号：'+id+'　発行日：'+new Date().toLocaleDateString('ja-JP');
  document.getElementById('doc-id').textContent=id;

  document.getElementById('preview-info').innerHTML=
    infoRow('病院名',v('f-hospital'))+infoRow('担当者',v('f-contact'))+
    infoRow('部署',v('f-dept'))+infoRow('電話',v('f-tel'))+
    infoRow('製品名',v('f-product'))+infoRow('型番',v('f-model'))+
    infoRow('ロット番号',v('f-lot'))+infoRow('シリアル番号',v('f-serial'))+
    infoRow('数量',v('f-qty'))+infoRow('故障内容',v('f-issue'));

  document.getElementById('preview-recv-info').innerHTML=
    infoRow('受取日',v('f-recv-date'))+infoRow('自社担当',v('f-recv-staff'))+infoRow('コメント',v('f-recv-comment'));

  document.getElementById('preview-return-info').innerHTML=
    infoRow('修理完了日',v('f-repair-date'))+infoRow('返却日',v('f-return-date'))+
    infoRow('担当',v('f-return-staff'))+infoRow('修理結果',v('f-repair-result'));

  ['recv','return'].forEach(key=>{
    const g=document.getElementById('preview-'+key+'-photos');
    g.innerHTML=photos[key].length
      ?'<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:6px">'+
        photos[key].map(u=>`<img src="${u}" style="width:100%;border-radius:8px;border:0.5px solid #ddd">`).join('')+'</div>'
      :'';
  });

  ['recv-hospital','recv-staff','return-hospital','return-staff'].forEach(id=>{
    const c=document.getElementById('sign-'+id);
    const img=document.getElementById('prev-sign-'+id);
    if(c&&img)img.src=c.toDataURL();
  });

  const retDate=v('f-return-date');
  const badge=document.getElementById('status-badge');
  if(retDate){badge.className='status-badge badge-done';badge.innerHTML='<i class="ti ti-check" style="font-size:12px"></i> 返却済み';}
  else{badge.className='status-badge badge-recv';badge.innerHTML='<i class="ti ti-clock" style="font-size:12px"></i> 修理中';}
}

document.addEventListener('mouseup',()=>{drawing=false;});
document.addEventListener('touchend',()=>{drawing=false;});

['recv-hospital','recv-staff','return-hospital','return-staff'].forEach(initCanvas);
document.getElementById('f-recv-date').valueAsDate=new Date();
</script>
</body>
</html>
