<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>修理品受渡管理</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --surface-0:#f5f5f3;--surface-1:#efefed;--surface-2:#ffffff;
  --text-primary:#1a1a18;--text-secondary:#5f5e5a;--text-muted:#888780;
  --border:#e0dfd8;--border-strong:#c8c7c0;
  --fill-accent:#2563eb;--bg-accent:#eff6ff;
  --bg-success:#f0fdf4;--text-success:#166534;
  --bg-warning:#fffbeb;--text-warning:#92400e;
  --radius:8px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;background:var(--surface-0);color:var(--text-primary);min-height:100vh;padding:1rem}
.app{max-width:680px;margin:0 auto;padding-bottom:3rem}
.step-bar{display:flex;margin-bottom:1.5rem;border-radius:var(--radius);overflow:hidden;border:0.5px solid var(--border)}
.step-btn{flex:1;padding:10px 4px;font-size:12px;font-weight:500;border:none;background:var(--surface-1);color:var(--text-muted);cursor:pointer;transition:all .15s;border-right:0.5px solid var(--border);line-height:1.6}
.step-btn:last-child{border-right:none}
.step-btn.active{background:var(--fill-accent);color:#fff}
.step-btn.done{background:var(--bg-success);color:var(--text-success)}
.card{background:var(--surface-2);border:0.5px solid var(--border);border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.card-title{font-size:14px;font-weight:500;color:var(--text-secondary);margin-bottom:1rem;display:flex;align-items:center;gap:6px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:10px}
.field-row.full{grid-template-columns:1fr}
.field label{font-size:12px;color:var(--text-secondary);display:block;margin-bottom:4px}
.field input,.field textarea{width:100%;padding:8px 10px;font-size:13px;border:0.5px solid var(--border-strong);border-radius:var(--radius);background:var(--surface-2);color:var(--text-primary);font-family:inherit;outline:none;transition:.15s}
.field input:focus,.field textarea:focus{border-color:var(--fill-accent);box-shadow:0 0 0 3px var(--bg-accent)}
.field textarea{resize:vertical;min-height:60px}
.sign-wrap{border:0.5px solid var(--border-strong);border-radius:var(--radius);overflow:hidden;background:#fff}
.sign-wrap canvas{display:block;width:100%;height:110px;cursor:crosshair;touch-action:none}
.sign-toolbar{display:flex;justify-content:space-between;align-items:center;padding:5px 10px;background:var(--surface-1);border-top:0.5px solid var(--border)}
.sign-label{font-size:11px;color:var(--text-muted)}
.sign-clear{font-size:11px;padding:3px 8px;border:0.5px solid var(--border-strong);border-radius:var(--radius);background:transparent;color:var(--text-secondary);cursor:pointer}
.sign-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.signer-name{font-size:12px;font-weight:500;color:var(--text-secondary);margin-bottom:6px}
.photo-area{border:1.5px dashed var(--border-strong);border-radius:var(--radius);padding:1rem;text-align:center;cursor:pointer;transition:.15s;background:var(--surface-1)}
.photo-area:hover{border-color:var(--fill-accent);background:var(--bg-accent)}
.photo-area i{font-size:24px;color:var(--text-muted);display:block;margin-bottom:4px}
.photo-area p{font-size:12px;color:var(--text-muted)}
.photo-grid{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.photo-thumb{position:relative;border-radius:var(--radius);overflow:hidden;width:calc(50% - 4px);aspect-ratio:4/3;background:var(--surface-1)}
.photo-thumb img{width:100%;height:100%;object-fit:cover}
.photo-del{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.65);color:#fff;border:none;border-radius:50%;width:22px;height:22px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.btn-row{display:flex;gap:10px;margin-top:1.5rem}
.btn{padding:10px 20px;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;border:0.5px solid var(--border-strong);background:transparent;color:var(--text-primary);flex:1;transition:.15s}
.btn:hover{background:var(--surface-1)}
.btn.primary{background:var(--fill-accent);color:#fff;border-color:transparent}
.btn.primary:hover{opacity:.88}
.status-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:3px 10px;border-radius:20px}
.badge-recv{background:var(--bg-warning);color:var(--text-warning)}
.notice{font-size:12px;color:var(--text-muted);text-align:center;margin-top:.5rem}
#step-view>div{display:none}
#step-view>div.active{display:block}

/* ── A4印刷用プレビューカード ── */
/* 画面上では通常表示、html2canvas取得時はA4固定幅で描画 */
#preview-card{
  background:#fff;
  font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;
  color:#1a1a18;
  padding:16px 20px;
  border:0.5px solid #e0dfd8;
  border-radius:12px;
}
/* A4描画用：JSからwidth:794pxを一時的に設定してキャプチャ */
#preview-card.a4-render{
  width:794px!important;
  font-size:11px!important;
  padding:20px 24px!important;
  border-radius:0!important;
  border:none!important;
}

.pc-hdr{display:flex;justify-content:space-between;align-items:center;border-bottom:1.5px solid #1a1a18;padding-bottom:10px;margin-bottom:14px}
.pc-title{font-size:20px;font-weight:600;letter-spacing:.04em}
.pc-meta{font-size:10px;color:#888;margin-top:3px}
.pc-logo{height:38px;object-fit:contain}

/* テーブル形式の情報表示 */
.info-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:14px}
.info-table th{background:#f5f5f3;color:#5f5e5a;font-weight:500;padding:8px 10px;border:0.5px solid #c8c7c0;width:90px;text-align:left;white-space:nowrap}
.info-table td{padding:8px 10px;border:0.5px solid #c8c7c0;color:#1a1a18;word-break:break-all}
.sec-label{font-size:11px;font-weight:600;color:#5f5e5a;letter-spacing:.05em;margin-bottom:6px;margin-top:14px}

/* 受取情報＋写真横並び */
.recv-row{display:flex;gap:12px;margin-bottom:14px;align-items:flex-start}
.recv-info-wrap{flex:1}
.recv-photos-wrap{flex-shrink:0;display:flex;flex-direction:column;gap:4px}
.recv-photo{width:130px;height:98px;object-fit:cover;border-radius:4px;border:0.5px solid #c8c7c0;display:block}

/* サイン欄 */
.sign-2col{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.sign-box-label{font-size:10px;color:#888;margin-bottom:4px}
.sign-box-img{width:100%;height:90px;border:0.5px solid #c8c7c0;border-radius:4px;background:#fff;display:block;object-fit:contain}
.sign-box-blank{width:100%;height:90px;border:0.5px solid #c8c7c0;border-radius:4px;background:#fff}

/* 返却セクション */
.return-section{border-top:1px solid #c8c7c0;padding-top:10px}
.return-row1{display:flex;align-items:center;gap:20px;font-size:12px;margin-bottom:8px;flex-wrap:wrap}
.date-line{display:inline-block;border-bottom:1px solid #888;width:140px;height:1.3em;vertical-align:bottom}
.cb-label{display:inline-flex;align-items:center;gap:5px;cursor:pointer;font-size:12px}
.cb-label input{width:14px;height:14px;accent-color:#2563eb}
.return-row2{display:flex;align-items:center;gap:10px;font-size:12px;margin-bottom:8px;flex-wrap:wrap}
.other-line{flex:1;border:none;border-bottom:1px solid #888;font-size:12px;padding:0 4px;outline:none;background:transparent;min-width:100px}

@media print{
  @page{size:A4 portrait;margin:0}
  body,html{background:#fff!important;padding:0!important;margin:0!important}
  .step-bar,.btn-row,.notice,.photo-area,input[type=file],.photo-del,.sign-clear,.sign-toolbar{display:none!important}
  .app{max-width:100%!important;padding:0!important}
  #step-view>div{display:none!important}
  #preview-page{display:block!important}
  #preview-card{border:none!important;border-radius:0!important;padding:12mm 14mm!important;width:210mm!important;min-height:297mm;font-size:10.5px!important}
  .pc-title{font-size:16px!important}
  .pc-logo{height:30px!important}
  .btn-row,.notice{display:none!important}
}

@media(max-width:520px){
  .field-row{grid-template-columns:1fr}
  .sign-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="app">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem">
    <div>
      <div style="font-size:20px;font-weight:500">修理品受渡管理</div>
      <div style="font-size:12px;color:var(--text-muted)" id="doc-id">新規票</div>
    </div>
    <span class="status-badge badge-recv" id="status-badge"><i class="ti ti-clock" style="font-size:12px"></i> 未処理</span>
  </div>

  <div class="step-bar">
    <button class="step-btn active" onclick="goStep(0)"><i class="ti ti-clipboard-list"></i><br>製品情報</button>
    <button class="step-btn" onclick="goStep(1)"><i class="ti ti-arrow-down-circle"></i><br>受取</button>
    <button class="step-btn" onclick="goStep(2)"><i class="ti ti-file-check"></i><br>確認・PDF</button>
  </div>

  <div id="step-view">

    <!-- Step 0: 製品情報 -->
    <div class="active">
      <div class="card">
        <div class="card-title"><i class="ti ti-building-hospital"></i>施設情報</div>
        <div class="field-row">
          <div class="field"><label>病院名 / 施設名</label><input id="f-hospital" type="text" placeholder="例：〇〇医療センター"></div>
          <div class="field"><label>担当者名</label><input id="f-contact" type="text" placeholder="例：田中 花子"></div>
        </div>
        <div class="field-row full">
          <div class="field"><label>部署名</label><input id="f-dept" type="text" placeholder="例：ME部"></div>
        </div>
      </div>
      <div class="card">
        <div class="card-title"><i class="ti ti-device-medical"></i>製品情報</div>
        <div class="field-row">
          <div class="field"><label>製品名</label><input id="f-product" type="text" placeholder="例：輸液ポンプ XYZ-100"></div>
          <div class="field"><label>型番 / モデル</label><input id="f-model" type="text" placeholder="例：XYZ-100-A"></div>
        </div>
        <div class="field-row full">
          <div class="field"><label>シリアル番号</label><input id="f-serial" type="text" placeholder="例：SN-123456"></div>
        </div>
        <div class="field-row full">
          <div class="field"><label>数量</label><input id="f-qty" type="text" placeholder="例：1台"></div>
        </div>
        <div class="field-row full">
          <div class="field"><label>不具合・故障内容</label><textarea id="f-issue" placeholder="例：電源投入時に異常アラームが鳴る。"></textarea></div>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn primary" onclick="goStep(1)"><i class="ti ti-arrow-right"></i> 受取記録へ</button>
      </div>
    </div>

    <!-- Step 1: 受取 -->
    <div>
      <div class="card">
        <div class="card-title"><i class="ti ti-calendar"></i>受取情報</div>
        <div class="field-row">
          <div class="field"><label>受取日</label><input id="f-recv-date" type="date"></div>
          <div class="field"><label>自社担当者名</label><input id="f-recv-staff" type="text" placeholder="例：山田 太郎"></div>
        </div>
        <div class="field-row full">
          <div class="field"><label>受取時コメント</label><textarea id="f-recv-comment" placeholder="例：外装に擦り傷あり。付属品も含む。"></textarea></div>
        </div>
      </div>
      <div class="card">
        <div class="card-title"><i class="ti ti-camera"></i>受取時の写真（最大2枚）</div>
        <div class="photo-area" id="recv-photo-btn" onclick="document.getElementById('photo-recv-input').click()">
          <i class="ti ti-camera-plus"></i>
          <p>タップして写真を追加</p>
        </div>
        <input type="file" id="photo-recv-input" accept="image/*" multiple style="display:none" onchange="addPhotos('recv',this)">
        <div class="photo-grid" id="recv-photos"></div>
      </div>
      <div class="card">
        <div class="card-title"><i class="ti ti-pen"></i>受取時サイン</div>
        <div class="sign-grid">
          <div>
            <div class="signer-name"><i class="ti ti-building-hospital" style="font-size:13px"></i> 病院 / 施設担当者</div>
            <div class="sign-wrap">
              <canvas id="sign-recv-hospital" width="320" height="110"></canvas>
              <div class="sign-toolbar">
                <span class="sign-label">指またはペンでサイン</span>
                <button class="sign-clear" onclick="clearSign('recv-hospital')">クリア</button>
              </div>
            </div>
          </div>
          <div>
            <div class="signer-name"><i class="ti ti-building" style="font-size:13px"></i> 自社担当者</div>
            <div class="sign-wrap">
              <canvas id="sign-recv-staff" width="320" height="110"></canvas>
              <div class="sign-toolbar">
                <span class="sign-label">指またはペンでサイン</span>
                <button class="sign-clear" onclick="clearSign('recv-staff')">クリア</button>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn" onclick="goStep(0)"><i class="ti ti-arrow-left"></i> 戻る</button>
        <button class="btn primary" onclick="goStep(2)">確認・PDF出力 <i class="ti ti-arrow-right"></i></button>
      </div>
    </div>

    <!-- Step 2: 確認・PDF -->
    <div id="preview-page">

      <!-- ▼ このカードをA4でキャプチャする ▼ -->
      <div id="preview-card">

        <!-- ヘッダー -->
        <div class="pc-hdr">
          <div>
            <div class="pc-title">修理品受渡管理票</div>
            <div class="pc-meta" id="preview-docid"></div>
          </div>
          <img id="company-logo" class="pc-logo" alt="KAMIJO">
        </div>

        <!-- 施設・製品情報 -->
        <div class="sec-label">施設・製品情報</div>
        <table class="info-table" id="preview-info-table">
          <tr><th>病院名 / 施設名</th><td id="td-hospital"></td><th>担当者</th><td id="td-contact"></td><th>部署</th><td id="td-dept"></td></tr>
          <tr><th>製品名</th><td id="td-product"></td><th>型番</th><td id="td-model"></td><th>シリアル番号</th><td id="td-serial"></td></tr>
          <tr><th>数量</th><td id="td-qty"></td><th>故障内容</th><td id="td-issue" colspan="3"></td></tr>
        </table>

        <!-- 受取情報＋写真 -->
        <div class="recv-row">
          <div class="recv-info-wrap">
            <div class="sec-label">受取情報</div>
            <table class="info-table">
              <tr><th>受取日</th><td id="td-recv-date"></td></tr>
              <tr><th>自社担当</th><td id="td-recv-staff"></td></tr>
              <tr><th>コメント</th><td id="td-recv-comment"></td></tr>
            </table>
          </div>
          <div id="recv-photos-col" style="display:none">
            <div class="sec-label">受取写真</div>
            <div id="recv-photos-preview" style="display:flex;gap:6px"></div>
          </div>
        </div>

        <!-- 受取サイン -->
        <div class="sec-label">受取サイン</div>
        <div class="sign-2col" style="margin-bottom:12px">
          <div>
            <div class="sign-box-label">病院 / 施設担当者</div>
            <img id="prev-sign-recv-hospital" class="sign-box-img">
          </div>
          <div>
            <div class="sign-box-label">自社担当者</div>
            <img id="prev-sign-recv-staff" class="sign-box-img">
          </div>
        </div>

        <!-- 返却 -->
        <div class="return-section">
          <div class="sec-label">返却</div>
          <div class="return-row1">
            <span>日付：<span class="date-line"></span></span>
            <label class="cb-label"><input type="checkbox" id="cb-repaired"><span>修理完了</span></label>
            <label class="cb-label"><input type="checkbox" id="cb-unrepairable"><span>修理不能</span></label>
          </div>
          <div class="return-row2">
            <span style="font-weight:500;white-space:nowrap">未返却理由：</span>
            <label class="cb-label"><input type="checkbox" id="cb-discarded"><span>メーカーにて廃棄</span></label>
            <label class="cb-label" style="flex:1;min-width:0">
              <input type="checkbox" id="cb-other">
              <span style="white-space:nowrap">その他：</span>
              <input type="text" id="cb-other-text" class="other-line">
            </label>
          </div>
          <div class="sign-2col">
            <div>
              <div class="sign-box-label">病院 / 施設担当者</div>
              <div class="sign-box-blank"></div>
            </div>
            <div>
              <div class="sign-box-label">自社担当者</div>
              <div class="sign-box-blank"></div>
            </div>
          </div>
        </div>

      </div><!-- /preview-card -->

      <div class="btn-row">
        <button class="btn" onclick="goStep(1)"><i class="ti ti-arrow-left"></i> 戻る</button>
        <button class="btn primary" id="pdf-btn" onclick="savePDF()"><i class="ti ti-download"></i> PDFを保存</button>
      </div>
      <p class="notice" id="pdf-notice"></p>
    </div>

  </div>

const photos={recv:[]};
const canvases={};
let drawing=false,lastX=0,lastY=0,currentCanvas=null;

function initCanvas(id){
  const canvas=document.getElementById('sign-'+id);
  if(!canvas||canvases[id])return;
  canvases[id]=canvas;
  const ctx=canvas.getContext('2d');
  ctx.strokeStyle='#111';ctx.lineWidth=2;ctx.lineCap='round';ctx.lineJoin='round';
  function pos(e){
    const r=canvas.getBoundingClientRect();
    const sx=canvas.width/r.width,sy=canvas.height/r.height;
    const src=e.touches?e.touches[0]:e;
    return[(src.clientX-r.left)*sx,(src.clientY-r.top)*sy];
  }
  function start(e){e.preventDefault();drawing=true;currentCanvas=canvas;const[x,y]=pos(e);lastX=x;lastY=y;ctx.beginPath();ctx.arc(x,y,1,0,Math.PI*2);ctx.fillStyle='#111';ctx.fill();}
  function move(e){e.preventDefault();if(!drawing||currentCanvas!==canvas)return;const[x,y]=pos(e);ctx.beginPath();ctx.moveTo(lastX,lastY);ctx.lineTo(x,y);ctx.stroke();lastX=x;lastY=y;}
  function end(){drawing=false;}
  canvas.addEventListener('mousedown',start);
  canvas.addEventListener('mousemove',move);
  canvas.addEventListener('mouseup',end);
  canvas.addEventListener('touchstart',start,{passive:false});
  canvas.addEventListener('touchmove',move,{passive:false});
  canvas.addEventListener('touchend',end);
}

function clearSign(id){
  const c=document.getElementById('sign-'+id);
  if(c)c.getContext('2d').clearRect(0,0,c.width,c.height);
}

function addPhotos(key,input){
  const files=[...input.files];
  const remaining=2-photos[key].length;
  if(remaining<=0){alert('写真は最大2枚までです');input.value='';return;}
  files.slice(0,remaining).forEach(f=>{photos[key].push(URL.createObjectURL(f));});
  renderPhotos(key);
  input.value='';
  if(photos[key].length>=2) document.getElementById('recv-photo-btn').style.display='none';
}

function renderPhotos(key){
  const g=document.getElementById(key+'-photos');
  g.innerHTML=photos[key].map((url,i)=>`
    <div class="photo-thumb"><img src="${url}" alt="写真${i+1}">
    <button class="photo-del" onclick="removePhoto('${key}',${i})">×</button></div>`).join('');
}

function removePhoto(key,i){
  photos[key].splice(i,1);
  renderPhotos(key);
  document.getElementById('recv-photo-btn').style.display='';
}

const steps=document.querySelectorAll('#step-view>div');
const stepBtns=document.querySelectorAll('.step-btn');

function goStep(n){
  if(n===2) buildPreview();
  steps.forEach((s,i)=>s.classList.toggle('active',i===n));
  stepBtns.forEach((b,i)=>{
    b.classList.remove('active','done');
    if(i===n) b.classList.add('active');
    else if(i<n) b.classList.add('done');
  });
  ['recv-hospital','recv-staff'].forEach(initCanvas);
  window.scrollTo({top:0,behavior:'smooth'});
}

function v(id){return(document.getElementById(id)||{}).value||'';}
function setText(id,val){const el=document.getElementById(id);if(el)el.textContent=val||'—';}

function genId(){
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let id='';
  for(let i=0;i<5;i++) id+=chars[Math.floor(Math.random()*chars.length)];
  return id;
}

function buildPreview(){
  const id=genId();
  document.getElementById('preview-docid').textContent='管理番号：'+id+'　発行日：'+new Date().toLocaleDateString('ja-JP');
  document.getElementById('doc-id').textContent=id;
  document.getElementById('company-logo').src=LOGO_SRC;

  setText('td-hospital',v('f-hospital'));
  setText('td-contact',v('f-contact'));
  setText('td-dept',v('f-dept'));
  setText('td-product',v('f-product'));
  setText('td-model',v('f-model'));
  setText('td-serial',v('f-serial'));
  setText('td-qty',v('f-qty'));
  setText('td-issue',v('f-issue'));
  setText('td-recv-date',v('f-recv-date'));
  setText('td-recv-staff',v('f-recv-staff'));
  setText('td-recv-comment',v('f-recv-comment'));

  // photos
  const col=document.getElementById('recv-photos-col');
  const prev=document.getElementById('recv-photos-preview');
  if(photos.recv.length){
    col.style.display='block';
    prev.innerHTML=photos.recv.map(u=>`<img src="${u}" class="recv-photo">`).join('');
  } else {
    col.style.display='none';
    prev.innerHTML='';
  }

  // signs
  ['recv-hospital','recv-staff'].forEach(id=>{
    const c=document.getElementById('sign-'+id);
    const img=document.getElementById('prev-sign-'+id);
    if(c&&img) img.src=c.toDataURL();
  });
}

document.addEventListener('mouseup',()=>{drawing=false;});
document.addEventListener('touchend',()=>{drawing=false;});

async function savePDF(){
  const btn=document.getElementById('pdf-btn');
  const notice=document.getElementById('pdf-notice');
  btn.disabled=true;
  btn.innerHTML='<i class="ti ti-loader"></i> 生成中...';
  notice.textContent='しばらくお待ちください…';
  try{
    const el=document.getElementById('preview-card');
    // A4幅でレンダリング: 794px = 210mm @ 96dpi
    const origWidth=el.style.width;
    const origBorderRadius=el.style.borderRadius;
    const origPadding=el.style.padding;
    el.style.width='794px';
    el.style.borderRadius='0';
    el.style.padding='28px 36px';
    el.style.fontSize='12px';
    await new Promise(r=>setTimeout(r,100));

    const canvas=await html2canvas(el,{
      scale:2,
      useCORS:true,
      backgroundColor:'#ffffff',
      logging:false,
      width:794,
      windowWidth:794
    });

    el.style.width=origWidth;
    el.style.borderRadius=origBorderRadius;
    el.style.padding=origPadding;
    el.style.fontSize='';

    const {jsPDF}=window.jspdf;
    const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const pageW=pdf.internal.pageSize.getWidth();
    const pageH=pdf.internal.pageSize.getHeight();
    const margin=8;
    const imgW=pageW-margin*2;
    const imgH=(canvas.height/canvas.width)*imgW;

    if(imgH<=pageH-margin*2){
      pdf.addImage(canvas.toDataURL('image/jpeg',0.95),'JPEG',margin,margin,imgW,imgH);
    } else {
      // 複数ページ
      let srcY=0, remainH=imgH;
      while(remainH>0){
        const sliceH=Math.min(remainH,pageH-margin*2);
        const ratio=canvas.width/imgW;
        const sc=document.createElement('canvas');
        sc.width=canvas.width;
        sc.height=Math.ceil(sliceH*ratio);
        sc.getContext('2d').drawImage(canvas,0,srcY*ratio,canvas.width,sc.height,0,0,canvas.width,sc.height);
        if(srcY>0) pdf.addPage();
        pdf.addImage(sc.toDataURL('image/jpeg',0.95),'JPEG',margin,margin,imgW,sliceH);
        srcY+=sliceH; remainH-=sliceH;
      }
    }
    const docId=document.getElementById('doc-id').textContent||'修理品受渡管理票';
    pdf.save(docId+'.pdf');
    notice.textContent='✓ PDFを保存しました';
  }catch(e){
    notice.textContent='エラーが発生しました。もう一度お試しください。';
    console.error(e);
  }
  btn.disabled=false;
  btn.innerHTML='<i class="ti ti-download"></i> PDFを保存';
}

['recv-hospital','recv-staff'].forEach(initCanvas);
document.getElementById('f-recv-date').valueAsDate=new Date();
